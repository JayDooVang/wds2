<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Duck & Waifu API</title>
    <style>
        body {
          background-image: linear-gradient( 180deg,  rgba(247,247,247,1) 23.8%, rgba(252,221,221,1) 92% );
          font-family: 'Open Sans', sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          height: 100vh;
          margin: 0;
          }

        .results {
          background-color: #fff;
	        display: flex;
	        align-items: center;
	        justify-content: center;
          margin: 10px;
          height: 400px;
          width: 300px;
        }

        img {
          object-fit: cover;
          width: 300px;
          height: auto;
          margin: 20px;

        }

        button {
          background-color: darksalmon;
          border: 0;
          border-radius: 4px;
          color:#fff;
          font-size: 18px;
          padding: 10px;
          margin: 10px;
          width: 300px;

        }
    </style>
</head>

<body>

    <h1>Random Generator</h1>

    <!-- Random Duck Section -->
    <div>
        <h2>Random Duck</h2>
        <button onclick="getRandomDuck()">Get Random Duck</button>
        <br>
        <img id="duckImage" src="" alt="Random Duck will appear here">
    </div>

    <!-- Random Waifu Section -->
    <div>
        <h2>Random Waifu</h2>
        <button onclick="getRandomWaifu()">Get Random Waifu</button>
        <br>
        <img id="waifuImage" src="" alt="Random Waifu will appear here">
    </div>

    <script>
        async function getRandomDuck() {
            try {
                const response = await fetch("https://random-d.uk/api/v2/random");
                const data = await response.json();
                document.getElementById("duckImage").src = data.url;
            } catch (error) {
                console.error("Error fetching duck:", error);
            }
        }

        async function getRandomWaifu() {
            try {
                const response = await fetch("https://api.waifu.pics/sfw/waifu");
                const data = await response.json();
                document.getElementById("waifuImage").src = data.url;
            } catch (error) {
                console.error("Error fetching waifu:", error);
            }
        }
    </script>

</body>
</html>
